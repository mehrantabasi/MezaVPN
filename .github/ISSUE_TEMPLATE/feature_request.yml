name: Feature request
description: Suggest a focused improvement for MezaVPN
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Explain the user need rather than only describing a button or screen.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Suggested solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: priority
    attributes:
      label: How important is this to your daily use?
      options:
        - Nice to have
        - Helpful
        - Important
        - Essential
    validations:
      required: true
